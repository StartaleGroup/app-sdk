name: E2E Tests

on:
  pull_request:
    types: [labeled, synchronize, reopened]

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  setup:
    if: contains(github.event.pull_request.labels.*.name, 'e2e-test')
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/e2e-setup

      - name: Upload workspace
        uses: actions/upload-artifact@v4
        with:
          name: e2e-workspace
          path: |
            node_modules/
            packages/*/dist/
            e2e/node_modules/
          retention-days: 1

  smoke:
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: e2e-workspace

      - name: Run smoke tests
        run: |
          cd e2e
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' pnpm test:ci:smoke

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7

  google:
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    timeout-minutes: 30
    env:
      GOOGLE_TEST_EMAIL: ${{ secrets.GOOGLE_TEST_EMAIL }}
      GOOGLE_TEST_PASSWORD: ${{ secrets.GOOGLE_TEST_PASSWORD }}
      GOOGLE_TOTP_SECRET: ${{ secrets.GOOGLE_TOTP_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: e2e-workspace

      - name: Install branded Chrome
        run: pnpm --filter @startale/app-sdk-e2e install:chrome

      - name: Run Google OAuth tests
        run: |
          cd e2e
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' pnpm test:ci:google

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-google-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7

  eoa:
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    timeout-minutes: 30
    env:
      WALLET_SEED: ${{ secrets.WALLET_SEED }}
    steps:
      - uses: actions/checkout@v4

      - name: Download workspace
        uses: actions/download-artifact@v4
        with:
          name: e2e-workspace

      - name: Run EOA tests
        run: |
          cd e2e
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' pnpm test:ci:eoa

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-eoa-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
