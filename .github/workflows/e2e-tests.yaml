name: E2E Tests

on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_call:
    inputs:
      superapp-branch:
        description: 'SuperApp branch to test against (empty = use app.startale.com)'
        required: false
        default: ''
        type: string
    secrets:
      GOOGLE_TEST_EMAIL:
        required: true
      GOOGLE_TEST_PASSWORD:
        required: true
      GOOGLE_TOTP_SECRET:
        required: true
      WALLET_SEED:
        required: true
      SUPERAPP_GITHUB_TOKEN:
        required: false
      APP_ENV_FILE:
        required: false
      NPM_TOKEN:
        required: false

permissions:
  contents: read

concurrency:
  group: e2e-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Debug event context
        run: |
          echo "github.event_name: ${{ github.event_name }}"
          echo "inputs.superapp-branch: '${{ inputs.superapp-branch }}'"

  setup:
    if: >-
      inputs.superapp-branch != '' ||
      contains(github.event.pull_request.labels.*.name, 'e2e-test')
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/e2e-setup
        with:
          build: 'true'

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sdk-dist
          path: packages/*/dist/
          retention-days: 1

  smoke:
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/e2e-setup

      - name: Start SuperApp
        if: inputs.superapp-branch != ''
        uses: ./.github/actions/start-superapp
        with:
          branch: ${{ inputs.superapp-branch }}
          github-token: ${{ secrets.SUPERAPP_GITHUB_TOKEN }}
          app-env-content: ${{ secrets.APP_ENV_FILE }}
          npm-token: ${{ secrets.NPM_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: packages/

      - name: Run smoke tests
        env:
          SCW_URL: ${{ inputs.superapp-branch != '' && 'http://localhost:3000/' || '' }}
        run: |
          cd e2e
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' pnpm test:ci:smoke

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7

  google:
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    timeout-minutes: 30
    env:
      GOOGLE_TEST_EMAIL: ${{ secrets.GOOGLE_TEST_EMAIL }}
      GOOGLE_TEST_PASSWORD: ${{ secrets.GOOGLE_TEST_PASSWORD }}
      GOOGLE_TOTP_SECRET: ${{ secrets.GOOGLE_TOTP_SECRET }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/e2e-setup
        with:
          install-chrome: 'true'

      - name: Start SuperApp
        if: inputs.superapp-branch != ''
        uses: ./.github/actions/start-superapp
        with:
          branch: ${{ inputs.superapp-branch }}
          github-token: ${{ secrets.SUPERAPP_GITHUB_TOKEN }}
          app-env-content: ${{ secrets.APP_ENV_FILE }}
          npm-token: ${{ secrets.NPM_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: packages/

      - name: Run Google OAuth tests
        env:
          SCW_URL: ${{ inputs.superapp-branch != '' && 'http://localhost:3000/' || '' }}
        run: |
          cd e2e
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' pnpm test:ci:google

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-google-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7

  eoa:
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.0-noble
    timeout-minutes: 30
    env:
      WALLET_SEED: ${{ secrets.WALLET_SEED }}
    steps:
      - uses: actions/checkout@v4

      - uses: ./.github/actions/e2e-setup

      - name: Start SuperApp
        if: inputs.superapp-branch != ''
        uses: ./.github/actions/start-superapp
        with:
          branch: ${{ inputs.superapp-branch }}
          github-token: ${{ secrets.SUPERAPP_GITHUB_TOKEN }}
          app-env-content: ${{ secrets.APP_ENV_FILE }}
          npm-token: ${{ secrets.NPM_TOKEN }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: sdk-dist
          path: packages/

      - name: Run EOA tests
        env:
          SCW_URL: ${{ inputs.superapp-branch != '' && 'http://localhost:3000/' || '' }}
        run: |
          cd e2e
          xvfb-run --auto-servernum --server-args='-screen 0 1920x1080x24' pnpm test:ci:eoa

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-eoa-results
          path: |
            e2e/test-results/
            e2e/playwright-report/
          retention-days: 7
