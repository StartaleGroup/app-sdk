name: E2E Runtime
description: Lightweight setup for E2E test jobs — installs Node.js, pnpm, and downloads pre-built workspace artifacts.

runs:
  using: composite
  steps:
    - uses: actions/setup-node@v4
      with:
        node-version: 24

    - uses: pnpm/action-setup@v4

    - name: Download workspace
      uses: actions/download-artifact@v4
      with:
        name: e2e-workspace
